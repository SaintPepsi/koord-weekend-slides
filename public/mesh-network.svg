<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="#0d1117"/>

  <!-- Ambient glows -->
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- Network lines -->
  <g stroke="#00d4ff" stroke-opacity="0.07" stroke-width="1" fill="none">
    <!-- Primary connections -->
    <line x1="200" y1="150" x2="480" y2="320"/>
    <line x1="480" y1="320" x2="750" y2="200"/>
    <line x1="750" y1="200" x2="1100" y2="350"/>
    <line x1="1100" y1="350" x2="1400" y2="180"/>
    <line x1="1400" y1="180" x2="1700" y2="300"/>
    <line x1="480" y1="320" x2="600" y2="550"/>
    <line x1="600" y1="550" x2="900" y2="480"/>
    <line x1="900" y1="480" x2="1100" y2="350"/>
    <line x1="1100" y1="350" x2="1300" y2="600"/>
    <line x1="1300" y1="600" x2="1700" y2="500"/>
    <line x1="200" y1="150" x2="350" y2="500"/>
    <line x1="350" y1="500" x2="600" y2="550"/>
    <line x1="900" y1="480" x2="850" y2="750"/>
    <line x1="850" y1="750" x2="1100" y2="800"/>
    <line x1="1100" y1="800" x2="1300" y2="600"/>
    <line x1="1300" y1="600" x2="1550" y2="800"/>
    <line x1="1700" y1="500" x2="1750" y2="750"/>
    <line x1="350" y1="500" x2="250" y2="780"/>
    <line x1="250" y1="780" x2="500" y2="850"/>
    <line x1="500" y1="850" x2="850" y2="750"/>
    <line x1="1550" y1="800" x2="1750" y2="750"/>
    <line x1="600" y1="550" x2="750" y2="200"/>
    <line x1="1400" y1="180" x2="1300" y2="600"/>
    <line x1="1700" y1="300" x2="1700" y2="500"/>
  </g>

  <!-- Secondary connections (fainter) -->
  <g stroke="#7c3aed" stroke-opacity="0.04" stroke-width="1" fill="none">
    <line x1="200" y1="150" x2="750" y2="200"/>
    <line x1="600" y1="550" x2="1100" y2="350"/>
    <line x1="350" y1="500" x2="900" y2="480"/>
    <line x1="850" y1="750" x2="1550" y2="800"/>
    <line x1="250" y1="780" x2="850" y2="750"/>
    <line x1="1100" y1="800" x2="1750" y2="750"/>
  </g>

  <!-- Nodes -->
  <g fill="#00d4ff">
    <circle cx="200" cy="150" r="3" opacity="0.6"/>
    <circle cx="480" cy="320" r="4" opacity="0.7"/>
    <circle cx="750" cy="200" r="3" opacity="0.5"/>
    <circle cx="1100" cy="350" r="5" opacity="0.8"/>
    <circle cx="1400" cy="180" r="3" opacity="0.5"/>
    <circle cx="1700" cy="300" r="4" opacity="0.6"/>
    <circle cx="600" cy="550" r="3.5" opacity="0.6"/>
    <circle cx="900" cy="480" r="4" opacity="0.7"/>
    <circle cx="1300" cy="600" r="3.5" opacity="0.6"/>
    <circle cx="1700" cy="500" r="3" opacity="0.5"/>
    <circle cx="350" cy="500" r="3" opacity="0.5"/>
    <circle cx="850" cy="750" r="4" opacity="0.7"/>
    <circle cx="1100" cy="800" r="3.5" opacity="0.6"/>
    <circle cx="1550" cy="800" r="3" opacity="0.5"/>
    <circle cx="1750" cy="750" r="3" opacity="0.5"/>
    <circle cx="250" cy="780" r="3" opacity="0.4"/>
    <circle cx="500" cy="850" r="3" opacity="0.4"/>
  </g>

  <!-- Key node glows -->
  <circle cx="1100" cy="350" r="20" fill="url(#nodeGlow)" opacity="0.15"/>
  <circle cx="480" cy="320" r="15" fill="url(#nodeGlow)" opacity="0.1"/>
  <circle cx="900" cy="480" r="15" fill="url(#nodeGlow)" opacity="0.1"/>
</svg>
